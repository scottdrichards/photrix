# photrix.scottdrichards.com serves static built files from disk.
# local.photrix.scottdrichards.com reverse proxies to local dev services
# on the calling machine in the local subnet.

# Production site: built client + local API service on same host
server {
    listen 443 ssl http2;
    server_name photrix.scottdrichards.com;

    # ssl_certificate     /etc/letsencrypt/live/photrix.scottdrichards.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/photrix.scottdrichards.com/privkey.pem;

    root /opt/photrix/client;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Forwarded "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Local site: LAN-only access + reverse-proxy to calling machine
server {
    listen 443 ssl http2;
    server_name local.photrix.scottdrichards.com;

    # ssl_certificate     /etc/letsencrypt/live/local.photrix.scottdrichards.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/local.photrix.scottdrichards.com/privkey.pem;

    # Restrict local host to local subnet only.
    allow 192.168.1.0/24;
    allow 127.0.0.1;
    deny all;

    # Reflect local traffic to the caller IP.
    # Example: request from 192.168.1.42 -> proxy to 192.168.1.42:5173 and :3000.
    # This is for LAN dev only and assumes each developer runs local services on these ports.

    # UI on caller machine
    location / {
        proxy_pass http://$remote_addr:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Forwarded "";
    }

    # API on caller machine
    location /api/ {
        proxy_pass http://$remote_addr:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Forwarded "";
    }
}
